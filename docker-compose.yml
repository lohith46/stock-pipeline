version: "3.9"

services:
  # ── Kafka (KRaft mode, no Zookeeper) ─────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_JMX_PORT: 9101
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── MinIO (S3-compatible object storage) ─────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "mc alias set local http://localhost:9000 minioadmin minioadmin && mc ready local"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── MinIO bucket initialisation ───────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/stock-lake &&
      echo 'Bucket ready'
      "

  # ── DE-Stock exchange simulator (Rust WebSocket server) ───────────────────
  mock-stock:
    build:
      context: ../mock-stock        # path relative to docker-compose.yml
      dockerfile: Dockerfile
    container_name: mock-stock
    ports:
      - "8080:8080"
    # Override any config values via env vars passed as CLI args is not
    # supported by mock-stock; the config file is the single source of truth.
    # pipeline.toml already sets websocket_addr = "0.0.0.0" so Docker can
    # reach it via the container name.
    volumes:
      - ../mock-stock/config:/config:ro
    command: ["/config/pipeline.toml"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s   # give Rust build/startup time

  # ── WebSocket → Kafka bridge ──────────────────────────────────────────────
  ws-bridge:
    image: python:3.11-slim
    container_name: ws-kafka-bridge
    working_dir: /app
    environment:
      # mock-stock is reachable by service name inside Docker network
      WS_URL:                  "ws://mock-stock:8080"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      RECONNECT_DELAY_S:       "5"
      LOG_INTERVAL_N:          "1000"
      # Topic overrides (optional — these are already the defaults)
      TOPIC_TRADES:    "stock.trades"
      TOPIC_ORDERS:    "stock.orders"
      TOPIC_QUOTES:    "stock.quotes"
      TOPIC_ORDERBOOK: "stock.orderbook"
      TOPIC_STATS:     "stock.stats"
      TOPIC_HALTS:     "stock.halts"
      TOPIC_AGENTS:    "stock.agents"
    volumes:
      - .:/app
    command: >
      sh -c "pip install -e '.[dev]' -q &&
             python dagster_stock/utils/ws_to_kafka.py"
    depends_on:
      kafka:
        condition: service_healthy
      mock-stock:
        condition: service_healthy

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.3
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  # ── Dagster daemon + webserver ────────────────────────────────────────────
  dagster-webserver:
    image: python:3.11-slim
    container_name: dagster-webserver
    working_dir: /app
    ports:
      - "3010:3010"
    environment:
      DAGSTER_HOME:            /app/.dagster
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MINIO_ENDPOINT:          http://minio:9000
      MINIO_ACCESS_KEY:        minioadmin
      MINIO_SECRET_KEY:        minioadmin
      STORAGE_BUCKET:          stock-lake
      STORAGE_BACKEND:         s3
    volumes:
      - .:/app
      - dagster_home:/app/.dagster
    command: >
      sh -c "pip install -e '.[dev]' -q &&
             dagster-webserver -h 0.0.0.0 -p 3010 -f dagster_stock/definitions.py"
    depends_on:
      kafka:
        condition: service_healthy
      ws-bridge:
        condition: service_started

  dagster-daemon:
    image: python:3.11-slim
    container_name: dagster-daemon
    working_dir: /app
    environment:
      DAGSTER_HOME:            /app/.dagster
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MINIO_ENDPOINT:          http://minio:9000
      MINIO_ACCESS_KEY:        minioadmin
      MINIO_SECRET_KEY:        minioadmin
      STORAGE_BUCKET:          stock-lake
      STORAGE_BACKEND:         s3
    volumes:
      - .:/app
      - dagster_home:/app/.dagster
    command: >
      sh -c "pip install -e '.[dev]' -q && dagster-daemon run"
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  kafka_data:
  minio_data:
  grafana_data:
  dagster_home:
